<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب من البوفيه — نظام البوفيه</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap">
    <script>
        document.documentElement.classList.add('auth-pending');
        (function checkAuthImmediately() {
            const raw = sessionStorage.getItem('user');
            if (!raw) { window.location.replace('/index.html'); return; }
            try {
                const user = JSON.parse(raw);
                if (!user || !user.username || !user.user_type) window.location.replace('/index.html');
            } catch (e) { window.location.replace('/index.html'); }
        })();
    </script>
    <style>
        html.auth-pending body { visibility: hidden; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            color: #0f172a;
            padding-bottom: 6rem;
        }

        a { color: inherit; text-decoration: none; }

        /* ======= BUFFET CLOSED BANNER ======= */
        .buffet-banner {
            display: none;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            margin: 0;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .buffet-banner.show { display: flex; }
        .buffet-banner.prayer {
            background: #fffbeb;
            color: #92400e;
            border-bottom: 2px solid #fcd34d;
        }
        .buffet-banner.closed {
            background: #fef2f2;
            color: #991b1b;
            border-bottom: 2px solid #fca5a5;
        }
        .buffet-banner svg { width: 1.4rem; height: 1.4rem; flex-shrink: 0; }
        .buffet-banner-text { flex: 1; }
        .buffet-banner-text strong { display: block; font-size: 1rem; margin-bottom: 0.15rem; }
        .buffet-banner-text span { font-size: 0.85rem; opacity: 0.8; }

        /* ======= TOPBAR ======= */
        .topbar {
            background: linear-gradient(135deg, #02cf65, #009447);
            color: #fff;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 8px 20px -6px rgba(2, 150, 70, 0.35);
            position: relative;
            overflow: hidden;
        }
        .topbar::before {
            content: '';
            position: absolute;
            top: -40%; left: -10%;
            width: 16rem; height: 16rem;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            pointer-events: none;
        }
        .topbar-inner {
            max-width: 1200px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; position: relative; z-index: 1; flex-wrap: wrap;
        }
        .topbar-identity { display: flex; align-items: center; gap: 0.85rem; }
        .topbar-avatar {
            display: inline-flex; align-items: center; justify-content: center;
            width: 3rem; height: 3rem; border-radius: 0.85rem;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(4px);
            font-weight: 700; font-size: 1.15rem; flex-shrink: 0;
        }
        .topbar-text .topbar-name { font-size: 1.05rem; font-weight: 700; line-height: 1.3; }
        .topbar-badge {
            display: inline-flex; align-items: center; gap: 0.3rem;
            margin-top: 0.2rem; font-size: 0.75rem; font-weight: 600;
            padding: 0.15rem 0.6rem; border-radius: 999px;
            background: rgba(255,255,255,0.18);
        }
        .topbar-actions { display: flex; align-items: center; gap: 0.6rem; }
        .btn-ghost {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.55rem 0.95rem; border-radius: 0.65rem;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
            color: #fff; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s ease;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.22); }
        .btn-ghost svg { width: 1rem; height: 1rem; }

        /* ======= PAGE WRAP ======= */
        .page-wrap {
            max-width: 1200px; margin: 1.5rem auto 0;
            padding: 0 1.5rem;
            display: flex; flex-direction: column; gap: 1.25rem;
        }

        /* ======= STATS ======= */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .stat-card {
            background: #fff; border-radius: 1rem; padding: 1.25rem 1.4rem;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 3px rgba(15,23,42,0.06); border: 1px solid #eef2f6;
        }
        .stat-value { font-size: 1.6rem; font-weight: 700; color: #0f172a; }
        .stat-label { font-size: 0.85rem; color: #64748b; margin-top: 0.2rem; }
        .stat-icon {
            width: 3rem; height: 3rem; border-radius: 0.85rem;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .stat-icon svg { width: 1.4rem; height: 1.4rem; }
        .stat-icon.purple { background: #f3e8ff; color: #9333ea; }
        .stat-icon.green { background: #d1fae5; color: #059669; }
        .stat-icon.blue { background: #dbeafe; color: #2563eb; }

        /* ======= CARD ======= */
        .card {
            background: #fff; border-radius: 1rem;
            box-shadow: 0 1px 3px rgba(15,23,42,0.06); border: 1px solid #eef2f6;
            overflow: hidden;
        }
        .card-header {
            display: flex; align-items: center; gap: 0.5rem; justify-content: flex-end;
            padding: 1.1rem 1.4rem; border-bottom: 1px solid #f1f5f9;
            font-weight: 700; font-size: 1rem;
        }
        .card-header svg { width: 1.1rem; height: 1.1rem; color: #2563eb; }
        .card-body { padding: 1.4rem; }

        /* ======= FORM ======= */
        .form-group { margin-bottom: 1.1rem; }
        .form-group:last-child { margin-bottom: 0; }
        .form-group label {
            display: flex; align-items: center; gap: 0.4rem;
            font-size: 0.875rem; font-weight: 600; color: #1e293b; margin-bottom: 0.45rem;
        }
        .form-group label svg { width: 1rem; height: 1rem; color: #64748b; }
        .input-readonly,
        .form-group input[type="text"],
        .form-group textarea {
            width: 100%; padding: 0.7rem 1rem;
            border: 1px solid #e2e8f0; border-radius: 0.75rem;
            font-size: 0.95rem; background: #f8fafc; color: #0f172a;
            font-family: inherit; transition: all 0.2s ease;
        }
        .input-readonly { color: #64748b; background: #f1f5f9; cursor: not-allowed; }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none; border-color: #02cf65;
            box-shadow: 0 0 0 3px rgba(2,207,101,0.15); background: #fff;
        }
        .form-group textarea { resize: vertical; min-height: 4.5rem; }

        /* ======= PAYMENT ======= */
        .payment-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .payment-option {
            position: relative; border: 2px solid #e2e8f0; border-radius: 1rem;
            padding: 1.1rem 1rem; text-align: center; cursor: pointer;
            transition: all 0.2s ease; background: #fff;
        }
        .payment-option:hover { border-color: #cbd5e1; }
        .payment-option.selected { border-color: #02cf65; background: #ecfdf5; }
        .payment-check {
            position: absolute; top: 0.7rem; right: 0.7rem;
            width: 1.3rem; height: 1.3rem; border-radius: 50%;
            background: #02cf65; color: #fff; display: none;
            align-items: center; justify-content: center;
        }
        .payment-check svg { width: 0.8rem; height: 0.8rem; }
        .payment-option.selected .payment-check { display: flex; }
        .payment-icon {
            width: 2.6rem; height: 2.6rem; border-radius: 0.75rem;
            background: #eff6ff; color: #2563eb;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 0.6rem;
        }
        .payment-icon svg { width: 1.3rem; height: 1.3rem; }
        .payment-title { font-weight: 700; font-size: 0.95rem; }
        .payment-sub { font-size: 0.78rem; color: #94a3b8; margin-top: 0.15rem; }

        /* ======= SEARCH & FILTERS ======= */
        .search-bar { position: relative; margin-bottom: 1rem; }
        .search-bar input {
            width: 100%; padding: 0.75rem 1rem 0.75rem 2.6rem;
            border: 1px solid #e2e8f0; border-radius: 0.85rem;
            font-size: 0.95rem; background: #f8fafc;
        }
        .search-bar input:focus {
            outline: none; border-color: #02cf65;
            box-shadow: 0 0 0 3px rgba(2,207,101,0.15); background: #fff;
        }
        .search-bar .search-icon {
            position: absolute; left: 0.9rem; top: 50%;
            transform: translateY(-50%); color: #94a3b8;
            width: 1.1rem; height: 1.1rem;
        }
        .filter-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.85rem; margin-bottom: 1.2rem; }
        .filter-chip {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.75rem 0.6rem; border-radius: 0.85rem;
            background: #f8fafc; border: 1px solid #e2e8f0;
            font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: all 0.2s ease; color: #475569;
        }
        .filter-chip svg { width: 1.1rem; height: 1.1rem; }
        .filter-chip .count {
            background: #e2e8f0; color: #475569;
            border-radius: 999px; font-size: 0.75rem;
            padding: 0.05rem 0.5rem; font-weight: 700;
        }
        .filter-chip.active { background: #ecfdf5; border-color: #02cf65; color: #047857; }
        .filter-chip.active .count { background: #02cf65; color: #fff; }

        /* ======= PRODUCTS GRID ======= */
        .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.1rem; }
        .product-card {
            border: 1px solid #eef2f6; border-radius: 1rem; overflow: hidden;
            background: #fff; display: flex; flex-direction: column;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .product-card:hover { box-shadow: 0 8px 20px -8px rgba(15,23,42,0.15); transform: translateY(-2px); }
        .product-card.unavailable { opacity: 0.55; }
        .product-img-wrap { position: relative; width: 100%; aspect-ratio: 16/10; background: #f1f5f9; overflow: hidden; }
        .product-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .product-tag {
            position: absolute; top: 0.6rem; right: 0.6rem;
            display: inline-flex; align-items: center; gap: 0.3rem;
            background: rgba(255,255,255,0.95); font-size: 0.72rem; font-weight: 700;
            padding: 0.25rem 0.6rem; border-radius: 999px; color: #0f172a;
        }
        .product-tag svg { width: 0.85rem; height: 0.85rem; }
        .product-tag.food { color: #047857; }
        .product-tag.drink { color: #2563eb; }
        .unavailable-banner {
            position: absolute; inset: 0;
            background: rgba(15,23,42,0.55); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem;
        }
        .product-info { padding: 0.9rem 1rem 1.1rem; display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
        .product-name { font-weight: 700; font-size: 0.95rem; text-align: center; }
        .product-price { color: #2563eb; font-weight: 700; font-size: 1rem; text-align: center; }
        .product-stock { font-size: 0.75rem; color: #f59e0b; text-align: center; display: flex; align-items: center; justify-content: center; gap: 0.3rem; }
        .product-stock svg { width: 0.85rem; height: 0.85rem; }
        .qty-control { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-top: auto; }
        .qty-btn {
            width: 2.4rem; height: 2.4rem; border-radius: 0.6rem;
            border: 1px solid #e2e8f0; background: #f8fafc;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #334155; transition: all 0.15s ease; flex-shrink: 0;
        }
        .qty-btn:hover:not(:disabled) { background: #ecfdf5; border-color: #02cf65; color: #047857; }
        .qty-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .qty-value {
            flex: 1; text-align: center; font-weight: 700; font-size: 1rem;
            background: #f8fafc; border-radius: 0.6rem; padding: 0.5rem 0;
            border: 1px solid #e2e8f0;
        }
        .empty-state { text-align: center; padding: 3rem 1rem; color: #94a3b8; }
        .empty-state svg { width: 3rem; height: 3rem; margin-bottom: 0.75rem; opacity: 0.5; }

        /* ======= FLOATING BAR ======= */
        .floating-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; border-top: 1px solid #eef2f6;
            box-shadow: 0 -8px 24px -8px rgba(15,23,42,0.12);
            padding: 0.9rem 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; z-index: 50;
        }
        .floating-summary { display: flex; align-items: center; gap: 0.6rem; font-weight: 700; color: #0f172a; font-size: 1rem; }
        .floating-summary .sep { color: #cbd5e1; }
        .floating-summary svg { width: 1.1rem; height: 1.1rem; color: #02cf65; }
        .confirm-btn {
            display: inline-flex; align-items: center; gap: 0.55rem;
            padding: 0.85rem 1.6rem;
            background: linear-gradient(135deg, #02cf65, #009447);
            color: #fff; border: none; border-radius: 0.85rem;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 8px 20px -6px rgba(2,150,70,0.4);
            transition: transform 0.15s ease, box-shadow 0.15s ease; white-space: nowrap;
        }
        .confirm-btn:hover { transform: translateY(-2px); }
        .confirm-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .confirm-btn svg { width: 1.1rem; height: 1.1rem; }

        /* ======= TOAST ======= */
        .toast {
            position: fixed; top: 1.5rem; left: 50%;
            transform: translateX(-50%) translateY(-1rem);
            background: #0f172a; color: #fff;
            padding: 0.85rem 1.4rem; border-radius: 0.85rem;
            font-size: 0.9rem; font-weight: 600;
            box-shadow: 0 10px 25px -8px rgba(0,0,0,0.35);
            opacity: 0; pointer-events: none;
            transition: all 0.3s ease; z-index: 100;
            display: flex; align-items: center; gap: 0.5rem; max-width: 90vw;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: #b91c1c; }
        .toast.success { background: #047857; }
        .toast svg { width: 1.1rem; height: 1.1rem; flex-shrink: 0; }
        .loading-spinner {
            display: inline-block; width: 1rem; height: 1rem;
            border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ======= RESPONSIVE ======= */
        @media (max-width: 1000px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 760px) {
            .stats-row { grid-template-columns: 1fr; gap: 0.75rem; }
            .products-grid { grid-template-columns: repeat(2, 1fr); }
            .payment-row { grid-template-columns: 1fr; }
            .filter-row { grid-template-columns: 1fr; }
            .floating-bar { flex-direction: column; align-items: stretch; gap: 0.6rem; }
            .confirm-btn { width: 100%; justify-content: center; }
            .topbar-actions { width: 100%; justify-content: flex-end; }
        }
        @media (max-width: 480px) { .products-grid { grid-template-columns: 1fr 1fr; } .page-wrap { padding: 0 1rem; } }
    </style>
</head>
<body>

    <!-- ======= BUFFET STATUS BANNER ======= -->
    <div class="buffet-banner" id="buffetBanner">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <div class="buffet-banner-text">
            <strong id="buffetBannerTitle">البوفيه مغلق مؤقتاً</strong>
            <span id="buffetBannerSub">الطلب غير متاح الآن</span>
        </div>
    </div>

    <!-- ======= TOPBAR ======= -->
    <header class="topbar">
        <div class="topbar-inner">
            <div class="topbar-identity">
                <div class="topbar-avatar" id="userInitial">؟</div>
                <div class="topbar-text">
                    <div class="topbar-name" id="userName">جاري التحميل...</div>
                    <span class="topbar-badge" id="userTypeBadge">—</span>
                </div>
            </div>
            <div class="topbar-actions">
                <a class="btn-ghost" href="/consumption-history.html">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                    تفاصيل استهلاكي
                </a>
                <button type="button" class="btn-ghost" id="logoutBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    خروج
                </button>
            </div>
        </div>
    </header>

    <div class="page-wrap">

        <!-- ======= STATS ======= -->
        <div class="stats-row">
            <div class="stat-card">
                <div><div class="stat-value" id="statAvailable">0</div><div class="stat-label">الأصناف المتاحة</div></div>
                <div class="stat-icon purple">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                </div>
            </div>
            <div class="stat-card">
                <div><div class="stat-value" id="statTotal">0.00</div><div class="stat-label">المبلغ الإجمالي</div></div>
                <div class="stat-icon green">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>
                </div>
            </div>
            <div class="stat-card">
                <div><div class="stat-value" id="statSelected">0</div><div class="stat-label">الأصناف المختارة</div></div>
                <div class="stat-icon blue">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                </div>
            </div>
        </div>

        <!-- ======= ORDER INFO ======= -->
        <div class="card">
            <div class="card-header">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                معلومات الطلب
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        اسم المستفيد
                    </label>
                    <div class="input-readonly" id="beneficiaryName">—</div>
                </div>
                <div class="form-group">
                    <label for="deliveryLocation">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
                        مكان التسليم
                    </label>
                    <textarea id="deliveryLocation" placeholder="مثال: قاعة 1، مكتب المدير..."></textarea>
                </div>
            </div>
        </div>

        <!-- ======= PAYMENT ======= -->
        <div class="card">
            <div class="card-header">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                طريقة الدفع
            </div>
            <div class="card-body">
                <div class="payment-row" id="paymentRow">
                    <div class="payment-option" data-value="account">
                        <span class="payment-check"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                        <div class="payment-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.91 8.84 8.56 2.23a1.93 1.93 0 0 0-1.81 0L3.1 4.13a2.12 2.12 0 0 0-.05 3.69l12.22 6.93a2 2 0 0 0 1.94 0L21 12.51a2.12 2.12 0 0 0-.09-3.67Z"/></svg></div>
                        <div class="payment-title">على الحساب</div>
                        <div class="payment-sub">الخصم من الراتب</div>
                    </div>
                    <div class="payment-option selected" data-value="cash">
                        <span class="payment-check"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                        <div class="payment-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/></svg></div>
                        <div class="payment-title">كاش</div>
                        <div class="payment-sub">الدفع نقداً</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ======= PRODUCTS ======= -->
        <div class="card">
            <div class="card-body">
                <div class="search-bar">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="searchInput" placeholder="ابحث عن صنف...">
                </div>
                <div class="filter-row" id="filterRow">
                    <div class="filter-chip" data-filter="food">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
                        مأكولات <span class="count" id="countFood">0</span>
                    </div>
                    <div class="filter-chip" data-filter="drink">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2h8l-1 18a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2L8 2Z"/><path d="M7 9h10"/></svg>
                        مشروبات <span class="count" id="countDrink">0</span>
                    </div>
                    <div class="filter-chip active" data-filter="all">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        الكل <span class="count" id="countAll">0</span>
                    </div>
                </div>
                <div class="products-grid" id="productsGrid"></div>
                <div class="empty-state" id="emptyState" style="display:none;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <div>لا توجد نتائج مطابقة لبحثك</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ======= FLOATING BAR ======= -->
    <div class="floating-bar">
        <div class="floating-summary">
            <span id="floatCount">0</span> صنف
            <span class="sep">|</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>
            <span id="floatTotal">0.00</span> ج
        </div>
        <button type="button" class="confirm-btn" id="confirmBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg>
            <span id="confirmBtnText">تأكيد وإرسال الطلب</span>
        </button>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========================
        // 1. Supabase Init
        // ========================
        const SUPABASE_URL = 'https://hnhocwwupkdbngbdzpnl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuaG9jd3d1cGtkYm5nYmR6cG5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMzAyMTIsImV4cCI6MjA5NzYwNjIxMn0.6WnDf6MWPp-avFIXUgbxPQpNDcbxVGvo7iOswxdeNEg';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========================
        // 2. State
        // ========================
        let currentUser = null;
        let allProducts = [];
        let cart = {};
        let activeFilter = 'all';
        let searchQuery = '';
        let paymentType = 'cash';
        let buffetStatus = 'open'; // 'open' | 'prayer' | 'closed'

        const userTypeLabels = { worker: 'عامل', consumer: 'مستهلك', admin: 'مدير' };

        // ========================
        // 3. Auth
        // ========================
        function loadCurrentUser() {
            const raw = sessionStorage.getItem('user');
            if (!raw) { window.location.href = '/index.html'; return null; }
            try { return JSON.parse(raw); } catch(e) { window.location.href = '/index.html'; return null; }
        }

        function renderUserHeader() {
            document.getElementById('userName').textContent = currentUser.username;
            document.getElementById('userInitial').textContent = currentUser.username.trim().charAt(0) || '؟';
            document.getElementById('userTypeBadge').textContent = userTypeLabels[currentUser.user_type] || currentUser.user_type;
            document.getElementById('beneficiaryName').textContent = currentUser.username;
        }

        // ========================
        // 4. Buffet Status
        // ========================
        async function fetchBuffetStatus() {
            const { data, error } = await supabaseClient
                .from('buffet_settings')
                .select('status')
                .eq('id', 1)
                .single();
            if (!error && data) {
                buffetStatus = data.status;
                renderBuffetBanner();
            }
        }

        function renderBuffetBanner() {
            const banner = document.getElementById('buffetBanner');
            const title = document.getElementById('buffetBannerTitle');
            const sub = document.getElementById('buffetBannerSub');
            const confirmBtn = document.getElementById('confirmBtn');

            if (buffetStatus === 'open') {
                banner.className = 'buffet-banner';
                confirmBtn.disabled = Object.keys(cart).length === 0;
            } else if (buffetStatus === 'prayer') {
                banner.className = 'buffet-banner prayer show';
                title.textContent = '🕌 البوفيه متوقف مؤقتاً للصلاة';
                sub.textContent = 'سيعود البوفيه للعمل قريباً — يمكنك اختيار الأصناف مسبقاً';
                confirmBtn.disabled = true;
            } else {
                banner.className = 'buffet-banner closed show';
                title.textContent = '🚫 البوفيه مغلق الآن';
                sub.textContent = 'الطلب غير متاح في الوقت الحالي';
                confirmBtn.disabled = true;
            }
        }

        function subscribeToBuffetStatus() {
            supabaseClient.channel('buffet-consumer')
                .on('postgres_changes', {
                    event: '*', schema: 'public', table: 'buffet_settings'
                }, payload => {
                    if (payload.new && payload.new.status) {
                        buffetStatus = payload.new.status;
                        renderBuffetBanner();
                        if (buffetStatus === 'open') {
                            showToast('✅ البوفيه مفتوح الآن — يمكنك الطلب');
                        } else if (buffetStatus === 'prayer') {
                            showToast('🕌 البوفيه متوقف للصلاة مؤقتاً', 'error');
                        } else {
                            showToast('البوفيه أغلق الآن', 'error');
                        }
                    }
                })
                .subscribe();
        }

        // ========================
        // 5. Toast
        // ========================
        let toastTimer = null;
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            clearTimeout(toastTimer);
            toast.className = 'toast show ' + type;
            toast.innerHTML = (type === 'error'
                ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
                : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
            ) + '<span>' + message + '</span>';
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // ========================
        // 6. Products
        // ========================
        async function fetchProducts() {
            const { data, error } = await supabaseClient
                .from('products')
                .select('id, name, price, category, image_url, stock, is_available')
                .eq('is_available', true)
                .gt('stock', 0)
                .order('created_at', { ascending: true });
            if (error) { showToast('تعذر تحميل المنتجات. حاول تحديث الصفحة.', 'error'); return []; }
            return data || [];
        }

        function getFilteredProducts() {
            return allProducts.filter(p => {
                const matchesFilter = activeFilter === 'all' || p.category === activeFilter;
                const matchesSearch = !searchQuery || p.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilter && matchesSearch;
            });
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const emptyState = document.getElementById('emptyState');
            const filtered = getFilteredProducts();
            if (filtered.length === 0) { grid.innerHTML = ''; emptyState.style.display = 'block'; return; }
            emptyState.style.display = 'none';

            grid.innerHTML = filtered.map(p => {
                const qty = cart[p.id] || 0;
                const categoryLabel = p.category === 'food' ? 'مأكولات' : 'مشروبات';
                const imgSrc = p.image_url || ('https://placehold.co/400x250/f1f5f9/94a3b8?text=' + encodeURIComponent(p.name));
                return `
                <div class="product-card" data-id="${p.id}">
                    <div class="product-img-wrap">
                        <img src="${imgSrc}" alt="${escapeHtml(p.name)}" loading="lazy">
                        <span class="product-tag ${p.category}">${categoryLabel}</span>
                    </div>
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(p.name)}</div>
                        <div class="product-price">${p.price.toFixed(2)} ج</div>
                        <div class="product-stock">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                            المتبقي: ${p.stock} قطعة
                        </div>
                        <div class="qty-control">
                            <button type="button" class="qty-btn" data-action="dec" data-id="${p.id}" ${qty === 0 ? 'disabled' : ''}>−</button>
                            <div class="qty-value">${qty}</div>
                            <button type="button" class="qty-btn" data-action="inc" data-id="${p.id}" ${qty >= p.stock ? 'disabled' : ''}>+</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ========================
        // 7. Summary
        // ========================
        function updateSummary() {
            const availableCount = allProducts.length;
            let selectedCount = 0, totalAmount = 0;
            Object.entries(cart).forEach(([productId, qty]) => {
                if (qty > 0) {
                    selectedCount += qty;
                    const product = allProducts.find(p => p.id === productId);
                    if (product) totalAmount += product.price * qty;
                }
            });
            document.getElementById('statAvailable').textContent = availableCount;
            document.getElementById('statTotal').textContent = totalAmount.toFixed(2);
            document.getElementById('statSelected').textContent = selectedCount;
            document.getElementById('floatCount').textContent = selectedCount;
            document.getElementById('floatTotal').textContent = totalAmount.toFixed(2);

            // Only enable confirm if buffet is open AND items in cart
            const confirmBtn = document.getElementById('confirmBtn');
            confirmBtn.disabled = selectedCount === 0 || buffetStatus !== 'open';

            document.getElementById('countFood').textContent = allProducts.filter(p => p.category === 'food').length;
            document.getElementById('countDrink').textContent = allProducts.filter(p => p.category === 'drink').length;
            document.getElementById('countAll').textContent = allProducts.length;
        }

        // ========================
        // 8. Qty Controls
        // ========================
        document.getElementById('productsGrid').addEventListener('click', function(e) {
            const btn = e.target.closest('.qty-btn');
            if (!btn || btn.disabled) return;
            const id = btn.dataset.id;
            const action = btn.dataset.action;
            const product = allProducts.find(p => p.id === id);
            if (!product) return;
            let current = cart[id] || 0;
            if (action === 'inc' && current < product.stock) current += 1;
            else if (action === 'dec' && current > 0) current -= 1;
            cart[id] = current;
            if (cart[id] === 0) delete cart[id];
            renderProducts();
            updateSummary();
        });

        // ========================
        // 9. Search & Filters
        // ========================
        document.getElementById('searchInput').addEventListener('input', function(e) {
            searchQuery = e.target.value.trim();
            renderProducts();
        });
        document.getElementById('filterRow').addEventListener('click', function(e) {
            const chip = e.target.closest('.filter-chip');
            if (!chip) return;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            activeFilter = chip.dataset.filter;
            renderProducts();
        });

        // ========================
        // 10. Payment
        // ========================
        document.getElementById('paymentRow').addEventListener('click', function(e) {
            const option = e.target.closest('.payment-option');
            if (!option) return;
            document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
            option.classList.add('selected');
            paymentType = option.dataset.value;
        });

        // ========================
        // 11. Logout
        // ========================
        document.getElementById('logoutBtn').addEventListener('click', function() {
            sessionStorage.removeItem('user');
            window.location.href = '/index.html';
        });

        // ========================
        // 12. Confirm Order
        // ========================
        document.getElementById('confirmBtn').addEventListener('click', async function() {
            // منع الطلب إن كان البوفيه مغلقاً
            if (buffetStatus !== 'open') {
                const msgs = { prayer: 'البوفيه متوقف للصلاة مؤقتاً، يرجى الانتظار.', closed: 'البوفيه مغلق الآن، الطلب غير متاح.' };
                showToast(msgs[buffetStatus] || 'البوفيه غير متاح الآن.', 'error');
                return;
            }

            const deliveryLocation = document.getElementById('deliveryLocation').value.trim();
            const confirmBtn = this;
            const confirmBtnText = document.getElementById('confirmBtnText');

            if (!deliveryLocation) {
                showToast('يرجى كتابة مكان التسليم.', 'error');
                document.getElementById('deliveryLocation').focus();
                return;
            }

            const items = Object.entries(cart)
                .filter(([, qty]) => qty > 0)
                .map(([productId, qty]) => {
                    const product = allProducts.find(p => p.id === productId);
                    return { product_id: productId, name: product ? product.name : 'غير معروف', price: product ? product.price : 0, qty };
                });

            if (items.length === 0) { showToast('يرجى اختيار صنف واحد على الأقل.', 'error'); return; }

            const totalAmount = items.reduce((sum, item) => sum + (item.price * item.qty), 0);

            confirmBtn.disabled = true;
            confirmBtnText.innerHTML = '<span class="loading-spinner"></span> جاري الإرسال...';

            try {
                const { error } = await supabaseClient
                    .from('orders')
                    .insert({
                        beneficiary_name: currentUser.username,
                        payment_type: paymentType,
                        total_amount: totalAmount,
                        items: items,
                        delivery_location: deliveryLocation,
                        status: 'pending'
                    });

                if (error) { showToast('حدث خطأ أثناء إرسال الطلب. حاول مرة أخرى.', 'error'); return; }

                showToast('✅ تم إرسال طلبك بنجاح!', 'success');
                cart = {};
                document.getElementById('deliveryLocation').value = '';
                renderProducts();
                updateSummary();
            } catch(err) {
                showToast('حدث خطأ غير متوقع. حاول مرة أخرى.', 'error');
            } finally {
                confirmBtnText.textContent = 'تأكيد وإرسال الطلب';
                renderBuffetBanner(); // يُعيد ضبط الزر حسب الحالة
            }
        });

        // ========================
        // 13. Init
        // ========================
        async function init() {
            currentUser = loadCurrentUser();
            if (!currentUser) return;
            renderUserHeader();

            await Promise.all([fetchBuffetStatus(), (async () => { allProducts = await fetchProducts(); })()]);

            renderProducts();
            updateSummary();
            subscribeToBuffetStatus();

            document.documentElement.classList.remove('auth-pending');
        }

        init();
    </script>
</body>
</html>
